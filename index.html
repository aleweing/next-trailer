<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Next Show</title>
  <meta name="description" content="Tráilers de cartelera actual y próximos estrenos, películas y series." />
  <meta name="theme-color" content="#0b0b0d" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <link rel="manifest" href="./manifest.json" />
  <link rel="apple-touch-icon" href="./icons/icon-192.png" />
  <link rel="stylesheet" href="./style.css" />
</head>
<body>
  <main>
    <header class="topbar">
      <div>
        <h1>Next Show</h1>
        <p class="subtitle">Cartelera actual y próximos estrenos.</p>
      </div>
    </header>

    <nav class="tabs" id="tabs">
      <button class="tab active" data-tab="movies">Películas</button>
      <button class="tab" data-tab="series">Series</button>
    </nav>

    <div id="content"></div>
  </main>

  <div class="sheet-overlay" id="sheet-overlay">
    <div class="sheet">
      <h2>Todos los recientes</h2>
      <ul id="sheet-list"></ul>
    </div>
  </div>

  <div class="player-overlay" id="player-overlay">
    <button class="player-close" id="player-close">Cerrar</button>
    <div class="player-wrap">
      <iframe
        id="player-frame"
        src=""
        title="Tráiler"
        allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"
        allowfullscreen
      ></iframe>
    </div>
  </div>

  <script src="./app.js" defer></script>
</body>
</html>
