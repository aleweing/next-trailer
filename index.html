<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Next Show</title>
  <meta name="description" content="Tráilers de cartelera actual y próximos estrenos, películas y series." />
  <meta name="theme-color" content="#0b0b0d" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <link rel="manifest" href="./manifest.json" />
  <link rel="apple-touch-icon" href="./icons/icon-192.png" />
  <link rel="stylesheet" href="./style.css" />
</head>
<body>
  <main>
    <header class="topbar">
      <h1>Next Show</h1>
    </header>

    <nav class="segmented" id="segmented"></nav>

    <div id="content" class="grid"></div>
  </main>

  <nav class="bottom-nav" id="bottom-nav">
    <button class="nav-item active" data-media="movies">
      <span class="nav-icon">🎬</span>
      <span>Películas</span>
    </button>
    <button class="nav-item" data-media="series">
      <span class="nav-icon">📺</span>
      <span>Series</span>
    </button>
  </nav>

  <div class="player-overlay" id="player-overlay">
    <button class="player-close" id="player-close">Cerrar</button>
    <div class="player-wrap">
      <iframe
        id="player-frame"
        src=""
        title="Tráiler"
        allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"
        allowfullscreen
      ></iframe>
    </div>
  </div>

  <script src="./app.js" defer></script>
</body>
</html>
